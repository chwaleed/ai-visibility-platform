# Production compose — pulls prebuilt images from Docker Hub; no source checkout
# needed on the server. Deployed by .github/workflows/deploy.yml.
#
# One-time server setup (in the deploy directory, ~/ai-visibility):
#   create backend.env with real values — see backend/.env.example
services:
  backend:
    # Not published to the host — only the frontend is exposed; nginx proxies
    # /api/ to this service over the compose network.
    image: ${DOCKERHUB_USERNAME}/ai-visibility-backend:latest
    env_file:
      - ./backend.env
    volumes:
      - backend_db:/app/instance
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME}/ai-visibility-frontend:latest
    ports:
      # localhost-only: reachable through the host nginx (domain + TLS), never
      # directly via http://<ip>:3000
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_db:
