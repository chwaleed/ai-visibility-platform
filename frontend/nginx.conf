server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin API: proxy /api/ to the backend service on the compose
    # network — the backend container is never published to the host.
    # The variable + resolver defer DNS to request time so the image still
    # starts when no `backend` host exists (e.g. standalone `docker run`).
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:5000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;    # sync pipeline runs take 30-120s+
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
