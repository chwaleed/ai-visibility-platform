# CI/CD: push to main → build both images → push to Docker Hub → SSH to the
# server → pull the new images → restart compose.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME   Docker Hub username
#   DOCKERHUB_TOKEN      Docker Hub access token (hub.docker.com → Account settings → Security)
#   VITE_API_BASE_URL    Public URL browsers reach the API at, e.g. http://<server-ip>:5000
#                        (Vite bakes it into the frontend bundle at BUILD time)
#   SERVER_HOST          Server IP or hostname
#   SERVER_USER          SSH user (e.g. ubuntu)
#   SERVER_SSH_KEY       Private SSH key for that user (PEM contents)
#   SERVER_PORT          Optional — defaults to 22
#
# One-time server setup:
#   - Docker + compose plugin installed; SERVER_USER in the docker group
#   - mkdir -p ~/ai-visibility && create ~/ai-visibility/backend.env (see backend/.env.example)

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-visibility-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-visibility-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-visibility-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-visibility-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy production compose file to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: docker-compose.prod.yml
          target: ~/ai-visibility

      - name: Pull new images & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ~/ai-visibility
            if [ ! -f backend.env ]; then
              echo "ERROR: ~/ai-visibility/backend.env missing — create it once from backend/.env.example"
              exit 1
            fi
            export DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}'
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
